services:
  fcp-sfd-comms:
    build:
      target: development
    image: fcp-sfd-comms-development
    container_name: fcp-sfd-comms-development
    links:
      - "floci:floci"
      - "mongodb:mongodb"
    depends_on:
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3001
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
      SQS_ENDPOINT: http://floci:4566
      COMMS_REQUEST_QUEUE_URL: http://floci:4566/000000000000/fcp_sfd_comms_request
      COMMS_REQUEST_DEAD_LETTER_QUEUE_URL: http://floci:4566/000000000000/fcp_sfd_comms_request-deadletter
      SNS_ENDPOINT: http://floci:4566
      COMM_EVENTS_TOPIC_ARN: arn:aws:sns:eu-west-2:000000000000:fcp_sfd_comm_events
      FDM_QUEUE_URL: http://floci:4566/000000000000/fcp_fdm_events
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      NOTIFY_API_KEY: ${NOTIFY_API_KEY}

  floci:
    image: hectorvent/floci:1.5.5
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - floci-data:/app/data

  floci-init:
    image: amazon/aws-cli:latest
    entrypoint: /bin/sh
    command: /setup/init.sh
    depends_on:
      floci:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - ./floci/init.sh:/setup/init.sh

  mongodb:
    image: mongo:6.0.13

volumes:
  floci-data:
